<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10通道監控系統 - 最終修復版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        :root { --alert-red: #ff4d4d; --bg-gray: #f0f2f5; --primary: #3498db; --dark: #2c3e50; }
        body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg-gray); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 頂部導航 */
        .top-bar { background: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 100; }
        .status-info { display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #ccc; transition: 0.3s; }

        /* 卡片區域 */
        .dashboard { flex: 1; display: grid; padding: 15px; gap: 15px; overflow-y: auto; grid-template-columns: repeat(1, 1fr); align-content: start; }
        @media (min-width: 600px) { .dashboard { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .dashboard { grid-template-columns: repeat(5, 1fr); } }

        .sensor-card { background: white; border-radius: 12px; padding: 15px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 2px solid transparent; }
        .sensor-card.alert { border-color: var(--alert-red); background-color: #fff1f1; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { box-shadow: 0 0 5px var(--alert-red); } to { box-shadow: 0 0 15px var(--alert-red); } }
        
        .ch-label { font-size: 0.7rem; background: #eee; padding: 2px 6px; border-radius: 4px; color: #666; float: left; }
        .alias-input { display: block; width: 100%; border: none; border-bottom: 1px dashed #ccc; font-size: 1.1rem; font-weight: bold; margin-top: 5px; outline: none; background: transparent; text-align: center; color: var(--dark); }
        .sensor-value { font-size: 3rem; font-weight: bold; margin: 10px 0; color: var(--dark); min-height: 3.5rem; }
        .threshold-box { font-size: 0.85rem; color: #888; border-top: 1px solid #f5f5f5; padding-top: 10px; }
        .threshold-box input { width: 55px; padding: 4px; text-align: center; border: 1px solid #ddd; border-radius: 4px; }
        .threshold-box select { width: 55px; padding: 4px; text-align: center; border: 1px solid #ddd; border-radius: 4px; background: white; }

        /* 按鈕與彈窗 */
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-settings { background: #666; color: white; }
        .btn-conn { background: var(--primary); color: white; }
        .btn-conn.connected { background: #e74c3c; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: white; width: 90%; max-width: 400px; border-radius: 12px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .setting-row { margin-bottom: 15px; }
        .setting-row label { display: block; font-size: 0.85rem; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        .input-group { display: flex; gap: 5px; margin-bottom: 5px; }
        input[type="text"], input[type="number"], select { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }

        #log-console { background: #1a1a1a; color: #0f0; font-family: monospace; font-size: 11px; height: 100px; overflow-y: auto; padding: 8px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="status-info">
            <div id="status-dot" class="status-dot"></div>
            <span id="status-text">未連線</span>
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="conn-btn" class="btn btn-conn" onclick="handleConnect()">🚀 連線</button>
            <button id="audio-btn" class="btn" style="background:#eee" onclick="toggleAudio()">🔊 音效：關閉</button>
            <button class="btn btn-settings" onclick="toggleModal(true)">⚙️ 設定</button>
        </div>
    </div>

    <div class="dashboard" id="sensor-grid"></div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <h3 style="margin-top:0">系統參數設定</h3>
            <div class="setting-row">
                <label>MQTT Broker 網址</label>
                <div class="input-group">
                    <select id="broker-select" onchange="document.getElementById('broker-input').value=this.value"></select>
                    <button class="btn" style="background:#fee; color:red" onclick="deleteBroker()">🗑️</button>
                </div>
                <div class="input-group">
                    <input type="text" id="broker-input" placeholder="wss://broker.emqx.io:8084/mqtt">
                    <button class="btn" style="background:#27ae60; color:white" onclick="saveBroker()">💾 儲存</button>
                </div>
            </div>
            <div class="setting-row">
                <label>主題前綴 (Topic Prefix)</label>
                <input type="text" id="prefix-input" value="sensor/" onchange="localStorage.setItem('mqtt_prefix', this.value); updateHints();">
            </div>
            <div id="log-console">>> 系統準備就緒...</div>
            <button class="btn" style="width:100%; margin-top:10px; background:#ddd;" onclick="toggleModal(false)">關閉視窗</button>
        </div>
    </div>

    <audio id="alert-sound" preload="auto">
        <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
    </audio>

    <script>
        // --- 核心邏輯 ---
        var mqttClient = null;
        var isAudioOn = localStorage.getItem('audio_on') === '1';
        var alertSound = document.getElementById('alert-sound');
        var alarmTimer = null;
        var alarmPhase = 'off';

        function syncAudioButton() {
            var btn = document.getElementById('audio-btn');
            if (!btn) return;
            btn.innerText = isAudioOn ? "✅ 音效：開啟" : "🔊 音效：關閉";
            btn.style.background = isAudioOn ? "#dff7e6" : "#eee";
        }

        function hasAnyAlert() {
            return !!document.querySelector('.sensor-card.alert');
        }

        function stopAlarmLoop() {
            if (alarmTimer) {
                clearTimeout(alarmTimer);
                alarmTimer = null;
            }
            alarmPhase = 'off';
            if (alertSound) {
                alertSound.pause();
                alertSound.loop = false;
            }
        }

        function startAlarmOnPhase() {
            if (!isAudioOn || !hasAnyAlert()) {
                stopAlarmLoop();
                return;
            }
            if (alarmTimer) {
                clearTimeout(alarmTimer);
                alarmTimer = null;
            }
            alarmPhase = 'on';
            if (alertSound) {
                alertSound.currentTime = 0;
                alertSound.loop = true;
                alertSound.play().catch(function(){});
            }
            alarmTimer = setTimeout(function() {
                startAlarmOffPhase();
            }, 5000);
        }

        function startAlarmOffPhase() {
            if (!isAudioOn || !hasAnyAlert()) {
                stopAlarmLoop();
                return;
            }
            if (alarmTimer) {
                clearTimeout(alarmTimer);
                alarmTimer = null;
            }
            if (alertSound) {
                alertSound.pause();
                alertSound.loop = false;
            }
            alarmPhase = 'off';
            alarmTimer = setTimeout(function() {
                startAlarmOnPhase();
            }, 10000);
        }

        function updateAlarmLoop() {
            if (isAudioOn && hasAnyAlert()) {
                if (!alarmTimer) startAlarmOnPhase();
                return;
            }
            stopAlarmLoop();
        }

        // 1. 生成卡片 (立即執行)
        function renderCards() {
            var container = document.getElementById('sensor-grid');
            if (!container) return;
            var html = "";
            for (var i = 1; i <= 10; i++) {
                var alias = localStorage.getItem('alias-' + i) || ('設備 ' + i);
                var limit = localStorage.getItem('limit-' + i) || 30;
                var op = localStorage.getItem('op-' + i) || 'lt';
                html += '<div class="sensor-card" id="card-' + i + '">' +
                        '<span class="ch-label">CH ' + i + '</span>' +
                        '<input type="text" class="alias-input" value="' + alias + '" onchange="localStorage.setItem(\'alias-' + i + '\', this.value)">' +
                        '<div class="sensor-value" id="val-' + i + '">--</div>' +
                        '<div class="threshold-box">' +
                        '警報 <select id="op-' + i + '" onchange="localStorage.setItem(\'op-' + i + '\', this.value)">' +
                        '<option value="lt"' + (op === 'lt' ? ' selected' : '') + '>&lt;</option>' +
                        '<option value="eq"' + (op === 'eq' ? ' selected' : '') + '>=</option>' +
                        '<option value="gt"' + (op === 'gt' ? ' selected' : '') + '>&gt;</option>' +
                        '</select> <input type="number" id="limit-' + i + '" value="' + limit + '" onchange="localStorage.setItem(\'limit-' + i + '\', this.value)">' +
                        '</div>' +
                        '<div id="hint-' + i + '" style="font-size:0.6rem; color:#ccc; margin-top:5px;"></div>' +
                        '</div>';
            }
            container.innerHTML = html;
        }

        // 2. 初始載入設定
        function initSettings() {
            var list = JSON.parse(localStorage.getItem('mqtt_list') || '[]');
            var sel = document.getElementById('broker-select');
            sel.innerHTML = '<option value="">-- 歷史記錄 --</option>';
            list.forEach(function(url) {
                var opt = document.createElement('option');
                opt.value = url; opt.textContent = url;
                sel.appendChild(opt);
            });
            var last = localStorage.getItem('mqtt_last');
            if (last) document.getElementById('broker-input').value = last;
            var pre = localStorage.getItem('mqtt_prefix') || 'sensor/';
            document.getElementById('prefix-input').value = pre;
            updateHints();
        }

        function updateHints() {
            var pre = document.getElementById('prefix-input').value;
            for (var i = 1; i <= 10; i++) {
                var h = document.getElementById('hint-' + i);
                if (h) h.innerText = pre + i;
            }
        }

        // 3. 連線功能
        function handleConnect() {
            if (mqttClient && mqttClient.connected) {
                mqttClient.end();
                return;
            }
            var url = document.getElementById('broker-input').value.trim();
            if (!url) { toggleModal(true); return; }

            addLog("嘗試連線: " + url);
            mqttClient = mqtt.connect(url, { connectTimeout: 5000 });

            mqttClient.on('connect', function() {
                addLog("✅ 連線成功", "#00ff00");
                setUI(true);
                var pre = document.getElementById('prefix-input').value;
                for (var i = 1; i <= 10; i++) mqttClient.subscribe(pre + i);
            });

            mqttClient.on('message', function(topic, msg) {
                var pre = document.getElementById('prefix-input').value;
                var id = parseInt(topic.replace(pre, ''));
                if (id >= 1 && id <= 10) {
                    var val = parseFloat(msg.toString());
                    var limit = parseFloat(document.getElementById('limit-' + id).value);
                    var opEl = document.getElementById('op-' + id);
                    var op = opEl ? opEl.value : 'lt';
                    var valEl = document.getElementById('val-' + id);
                    var cardEl = document.getElementById('card-' + id);
                    
                    if (valEl) {
                        valEl.innerText = isNaN(val) ? msg.toString() : val;
                        var isAlert = false;
                        if (!isNaN(val) && !isNaN(limit)) {
                            if (op === 'lt') isAlert = val < limit;
                            else if (op === 'eq') isAlert = val === limit;
                            else if (op === 'gt') isAlert = val > limit;
                        }
                        if (isAlert) {
                            valEl.style.color = "red";
                            cardEl.classList.add('alert');
                        } else {
                            valEl.style.color = "var(--dark)";
                            cardEl.classList.remove('alert');
                        }
                        updateAlarmLoop();
                    }
                }
            });

            mqttClient.on('close', function() { setUI(false); addLog("連線已斷開"); });
            mqttClient.on('error', function(e) { addLog("❌ 錯誤: " + e.message, "red"); });
        }

        // 4. 小功能函數
        function toggleModal(s) { document.getElementById('modal-overlay').style.display = s ? 'flex' : 'none'; }
        
        function saveBroker() {
            var url = document.getElementById('broker-input').value.trim();
            if (!url) return;
            var list = JSON.parse(localStorage.getItem('mqtt_list') || '[]');
            if (list.indexOf(url) === -1) list.push(url);
            localStorage.setItem('mqtt_list', JSON.stringify(list));
            localStorage.setItem('mqtt_last', url);
            initSettings();
            addLog("Broker 已儲存");
        }

        function deleteBroker() {
            var url = document.getElementById('broker-select').value;
            if (!url) return;
            var list = JSON.parse(localStorage.getItem('mqtt_list') || '[]');
            list = list.filter(function(i) { return i !== url; });
            localStorage.setItem('mqtt_list', JSON.stringify(list));
            initSettings();
            document.getElementById('broker-input').value = "";
        }

        function setUI(c) {
            document.getElementById('conn-btn').innerText = c ? "🛑 斷開" : "🚀 連線";
            document.getElementById('conn-btn').className = c ? "btn btn-conn connected" : "btn btn-conn";
            document.getElementById('status-dot').style.background = c ? "#2ecc71" : "#ccc";
            document.getElementById('status-text').innerText = c ? "已連線" : "未連線";
        }

        function toggleAudio() {
            isAudioOn = !isAudioOn;
            localStorage.setItem('audio_on', isAudioOn ? '1' : '0');
            syncAudioButton();
            updateAlarmLoop();
        }

        function addLog(m, c) {
            var l = document.getElementById('log-console');
            if (l) l.innerHTML = '<div style="color:'+(c||'#0f0')+'">['+new Date().toLocaleTimeString()+'] '+m+'</div>' + l.innerHTML;
        }

        // --- 啟動 ---
        renderCards();
        initSettings();
        syncAudioButton();
        updateAlarmLoop();
    </script>
</body>
</html>

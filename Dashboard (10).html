        </head><body style="margin:0; min-height:510px; position:relative; background:#ffffff;"><script>const delay=(seconds)=>{return new Promise((resolve)=>{setTimeout(resolve,seconds*1000);});};const main=async()=>{

            widget.appendChild(title);
            widget.appendChild(value);
            document.body.appendChild(widget);
        })();
        
        temperatureGauge({
            id: "tmp",
            name: "溫度 入",
            width: 100,
            left: 275,

        });
        
        temperatureGauge({

        if (typeof mqtt === "undefined") {
            console.error("mqtt library not loaded");
            return;
        }

        var mqtt_client = mqtt.connect("ws://iot.coreflux.cloud:5000/mqtt", options);
        mqtt_client.on("connect", ()=>{
            console.log("connected");
            mqtt_client.subscribe("623/rr/3");
mqtt_client.subscribe("623/rr/1");
mqtt_client.subscribe("623/rr/2");

            mqtt_client.on("message", async function (topic, payload) {
                
                if (topic == "623/rr/3") {
                    
            (function() {
                const elem = document.getElementById('text_box_value_水位');
                if (!elem) return;
                const value = new TextDecoder().decode(payload);
                const unit = elem.dataset.unit || '';
                elem.textContent = value.length ? (unit.length ? (value + ' ' + unit) : value) : '--';
            })();
            
                }
            
                if (topic == "623/rr/1") {
                    temperatureGauge({id: "tmp", val: (new TextDecoder().decode(payload))});
                }
            
                if (topic == "623/rr/2") {
                    temperatureGauge({id: "tmp2", val: (new TextDecoder().decode(payload))});
                }
            
            })
        })
